<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
        }
        h1 { margin-bottom: 30px; }
        .file-item {
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-name { font-weight: bold; }
        .download-link {
            color: #0066cc;
            text-decoration: none;
        }
        .download-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>📁 Files</h1>
    <div class="file-item">
        <span class="file-name">next.config.mjs</span>
        <a href="next.config.mjs" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">next-env.d.ts</span>
        <a href="next-env.d.ts" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">package.json</span>
        <a href="package.json" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">package-lock.json</span>
        <a href="package-lock.json" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">postcss.config.mjs</span>
        <a href="postcss.config.mjs" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">tailwind.config.ts</span>
        <a href="tailwind.config.ts" class="download-link" download>Download</a>
    </div>
    <div class="file-item">
        <span class="file-name">tsconfig.json</span>
        <a href="tsconfig.json" class="download-link" download>Download</a>
    </div>

</body>
</html>
