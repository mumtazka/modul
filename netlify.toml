[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect API paths to functions
[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/files"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/api/files/*"
  to = "/.netlify/functions/files"
  status = 200
