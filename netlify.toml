[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — must come AFTER function redirects
[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/files"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/api/files/*"
  to = "/.netlify/functions/files"
  status = 200

# Catch-all for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
