<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumstaz Kholafiyan Alfan</title>
    <style>
        :root {
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --line: #e5e7eb;
            --paper: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: linear-gradient(120deg, #eef2f7 0%, #f8fafc 60%, #ffffff 100%);
        }
        .page {
            max-width: 780px;
            margin: 40px auto;
            padding: 24px;
        }
        .card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--paper);
            border: 2px solid var(--accent);
            display: grid;
            place-items: center;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }
        .title h1 {
            margin: 0 0 4px 0;
            font-size: 26px;
        }
        .title p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }
        .section {
            margin-top: 20px;
        }
        .section h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .grid {
            display: grid;
            grid-template-columns: 160px 1fr;
            row-gap: 10px;
            column-gap: 14px;
            padding: 14px;
            background: var(--paper);
            border-radius: 10px;
            border: 1px solid var(--line);
        }
        .label {
            color: var(--muted);
        }
        .value {
            font-weight: 600;
        }
        .note {
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
        }
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .label { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="header">
                <div class="avatar">MK</div>
                <div class="title">
                    <h1>Mumtaz Kholafiyan Alfan</h1>
                    <p>Data Diri Siswa</p>
                </div>
            </div>

            <div class="section">
                <h2>Identitas</h2>
                <div class="grid">
                    <div class="label">Nama Lengkap</div>
                    <div class="value">Mumtaz Kholafiyan Alfan</div>

                    <div class="label">Kelas</div>
                    <div class="value">XII TJKT 2</div>

                    <div class="label">Absen</div>
                    <div class="value">25</div>
                </div>
            </div>

            <p class="note">Fullstack vibecoder. spam react+node+supa awokaokwkwaowkaw.</p>
        </div>
    </div>
</body>
</html>
